version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped

  worker-cards:
    build: .
    command: celery -A app.workers.celery_app worker -Q cards -c 4 --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped

  worker-attachments:
    build: .
    command: celery -A app.workers.celery_app worker -Q attachments -c 2 --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run ui/busca.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
